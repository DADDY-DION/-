<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>日本旅遊即時翻譯助手</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <h1>翻譯助手</h1>
                <button id="btnSettings" class="settings-btn" title="設定 API Key">⚙️</button>
            </div>
            <p class="status-message" id="statusMessage">準備就緒</p>
        </header>

        <main>
            <div class="chat-container" id="chatContainer">
                <!-- 翻譯結果會顯示在這裡 -->
            </div>

            <div class="controls">
                <button id="btnSpeakZh" class="record-btn zh-btn">
                    <span class="icon">🎤</span>
                    <span class="text">我說中文<br><small>(Push to talk)</small></span>
                </button>
                <button id="btnSpeakJa" class="record-btn ja-btn">
                    <span class="icon">🎤</span>
                    <span class="text">對方說日文<br><small>(日本語を話す)</small></span>
                </button>
                <button id="btnCamera" class="record-btn camera-btn">
                    <span class="icon">📷</span>
                    <span class="text">圖片翻譯<br><small>(OCR)</small></span>
                </button>
                <input type="file" id="imageInput" accept="image/*" style="display: none;">
            </div>
        </main>
    </div>

    <!-- 圖片覆蓋翻譯模態視窗 -->
    <div id="overlayModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <div id="imageWrapper" class="image-wrapper">
                <img id="sourceImage" alt="來源圖片">
                <div id="labelLayer" class="label-layer"></div>
            </div>
            <div class="modal-info">
                <p>點擊標籤可聽語音 | 下方為辨識出的原始日文：</p>
                <div id="debugRawText" class="debug-text"></div>
            </div>
        </div>
    </div>

    <!-- API Key 設定模態視窗 -->
    <div id="settingsModal" class="modal">
        <div class="modal-content settings-content">
            <span class="close-btn" id="closeSettings">&times;</span>
            <h2>系統設定</h2>
            <div class="setting-item">
                <label for="apiKeyInput">Google Gemini API Key:</label>
                <input type="password" id="apiKeyInput" placeholder="在此貼上您的 API Key">
                <p class="help-text">
                    <a href="https://aistudio.google.com/app/apikey" target="_blank">點此前往 Google AI Studio 免費取得 Key</a>
                </p>
            </div>
            <button id="btnSaveSettings" class="save-btn">儲存設定</button>
            <p class="security-note">⚠️ 金鑰僅儲存於您的手機瀏覽器中，不會上傳至任何伺服器。</p>
        </div>
    </div>

    <!-- Load Tesseract.js -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
